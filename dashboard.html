<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noter | Sign-up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="media/favicon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap');
    </style>

</head>

<body class="bg-gradient-to-b from-blue-950 to-blue-900 min-h-screen">

    <!-- NAVBAR -->
    <nav class="bg-white shadow-md px-8 py-4 flex justify-between items-center">

        <div class="flex items-center gap-3">
            <img src="media/favicon.png" alt="" class="h-[3rem]">
            <h1 class="text-[2.8rem] font-['sansation'] ml-[-1rem]">Noter</h1>
        </div>

        <div class="flex items-center gap-6">
            <input type="text" placeholder="Search notes..."
            class="px-4 py-2 rounded-lg border focus:outline-none focus:ring-2 focus:ring-blue-400" />

            <a href="index.html" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                Logout
            </a>
        </div>

    </nav>

    <div class="flex">

        <!-- SIDEBAR -->
        <aside class="w-64 bg-gradient-to-b from-black/70 to-blue-950 shadow-md min-h-screen p-6">

            <button class="w-full bg-blue-600 text-white text-[1.4rem] duration-300 py-3 rounded-lg mb-6 hover:bg-blue-700">
                + New Note
            </button>

            <ul class="space-y-4 text-white">

                <li class="flex items-center h-10 hover:text-blue-600 cursor-pointer pl-3 bg-white/25 hover:bg-white/60 duration-300 rounded-lg">
                    All Notes
                </li>

                <li class="flex items-center h-10 hover:text-blue-600 cursor-pointer pl-3 bg-white/25 hover:bg-white/60 duration-300 rounded-lg">
                    Important
                </li>

                <li class="flex items-center h-10 hover:text-blue-600 cursor-pointer pl-3 bg-white/25 hover:bg-white/60 duration-300 rounded-lg">
                    Trash
                </li>

            </ul>

        </aside>

        <!-- NOTES GRID -->
        <main class="flex p-8 ">
            <div class="w-[80%]">
                <h2 class="text-2xl font-semibold text-white mb-6">
                    Your Notes
                </h2>
    
                <div>
    
                </div>
    
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    
                    <!-- NOTE CARD -->
                    <div class="w-[24rem] h-[10rem] overflow-x-hidden bg-white rounded-xl shadow-md p-5 hover:shadow-lg transition">
    
                        <h3 class="font-semibold text-lg mb-2">
                            Physics Revision
                        </h3>
    
                        <p class="text-gray-600 text-sm">
                            Revise electrostatics formulas and derivations for tomorrow's test...
                        </p>
    
                        <div class="flex justify-between mt-4 text-sm text-gray-500">
                            <span>2 hours ago</span>
                            <button class="text-blue-600 hover:underline">
                                Open
                            </button>
                        </div>
    
                    </div>
    
                </div>

            </div>

        </main>


    </div>

</body>

</html>
