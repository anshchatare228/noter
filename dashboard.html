<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noter | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="media/favicon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap');
    </style>

</head>

<body class="bg-gradient-to-b from-blue-950 to-blue-900 min-h-screen">

    <!-- NAVBAR -->
    <nav class="bg-white/30 backdrop-blur-xl shadow-md px-8 py-4 flex justify-between items-center">

        <div class="flex items-center gap-3">
            <img src="media/favicon.png" alt="" class="h-[3rem]">
            <h1 class="text-[2.8rem] font-['sansation'] ml-[-1rem]">Noter</h1>
        </div>

        <div class="flex items-center gap-6">
            <input type="text" placeholder="Search notes..."
                class="px-4 py-2 rounded-lg border focus:outline-none focus:ring-2 focus:ring-blue-400" />

            <button id="logoutBtn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 cursor-pointer">
                Logout
            </button>
        </div>

    </nav>

    <div class="flex">

        <!-- SIDEBAR -->
        <aside class="w-64 bg-gradient-to-b from-black/70 to-blue-950 shadow-md min-h-screen p-6">

            <button id="newNoteBtn"
                class="w-full bg-blue-600 text-white text-[1.4rem] duration-300 py-3 rounded-lg mb-6 hover:bg-blue-700 cursor-pointer">
                + New Note
            </button>

            <ul class="space-y-4 text-white font-['arimo']">

                <li class="flex items-center h-10 hover:text-black cursor-pointer pl-3 bg-white/25 hover:bg-white duration-300 rounded-lg">
                    All Notes
                </li>

                <li
                    class="flex items-center h-10 hover:text-black cursor-pointer pl-3 bg-white/25 hover:bg-white duration-300 rounded-lg">
                    Important
                </li>

                <li
                    class="flex items-center h-10 hover:text-black cursor-pointer pl-3 bg-white/25 hover:bg-white duration-300 rounded-lg">
                    Trash
                </li>

            </ul>

            <div class="mt-6 ml-1">
                <h3 class="text-[1.3rem] text-white/80 font-['sansation'] pb-3">Tags</h3>
                <ul class="font-['arimo'] flex flex-col gap-4 text-white">
                    <li class="flex items-center h-10 hover:text-black cursor-pointer pl-3 bg-white/25 hover:bg-violet-300 duration-300 rounded-lg"><div class="h-3 w-3 rounded-full bg-violet-300 mr-2"></div>Personal</li>
                    <li class="flex items-center h-10 hover:text-black cursor-pointer pl-3 bg-white/25 hover:bg-yellow-200 duration-300 rounded-lg"><div class="h-3 w-3 rounded-full bg-yellow-200 mr-2"></div>Important</li>
                </ul>
            </div>

        </aside>

        <!-- NOTES GRID -->
        <main class="flex gap-8 p-8 w-full">

            <!-- MAIN SECTION -->
            <div class="w-[70%]">

                <h2 class="text-2xl font-semibold text-white mb-4">Your Notes</h2>

                <!-- FILTER BAR -->
                <div class="flex items-center justify-between mb-6">

                    <div class="flex gap-3">

                        <button class="bg-blue-600 duration-300 text-white px-4 py-1 rounded-lg">All Notes</button>

                        <button class="bg-white/20 duration-300 text-white px-4 py-1 rounded-lg hover:bg-white/90 hover:text-black">Important</button>

                        <button class="bg-white/20 duration-300 text-white px-4 py-1 rounded-lg hover:bg-white/90 hover:text-black">Newest</button>

                        <button class="bg-white/20 duration-300 text-white px-4 py-1 rounded-lg hover:bg-white/90 hover:text-black">Oldest</button>

                    </div>

                </div>


                <!-- NOTES GRID (dynamically filled by dashboard.js) -->
                <div id="notesGrid" class="grid grid-cols-2 xl:grid-cols-2 gap-6">
                    <p class="text-white/60 col-span-2 text-center py-10">Loading notes...</p>
                </div>

            </div>


            <!-- RIGHT PANEL -->
            <div class="w-[30%] flex flex-col gap-6">

                <!--AI BOX-->
                <div class="bg-white/10 backdrop-blur-md text-white p-6 rounded-xl shadow-lg">

                    <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">✨ Ask AI</h3>

                    <p class="text-sm text-white/70 mb-4">Paste a note or ask a question and the AI will summarize or explain it.</p>

                    <textarea id="aiInput" rows="3" placeholder="Paste your note here..." class="w-full p-3 rounded-lg bg-white/10 border border-white/20 focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none overflow-y-auto"
                    ></textarea>

                    <button
                    class="mt-3 w-full bg-blue-600 hover:bg-blue-700 transition py-2 rounded-lg font-medium"
                    >
                    Generate Summary
                    </button>

                </div>


                <!-- STATS -->
                <div class="bg-white/10 text-white p-5 rounded-xl">

                    <h3 class="text-lg font-semibold mb-4">
                        Overview
                    </h3>

                    <div class="flex justify-between mb-2">
                        <span>Important</span>
                        <span>3</span>
                    </div>

                    <div class="flex justify-between mb-2">
                        <span>Trash</span>
                        <span>1</span>
                    </div>

                    <div class="flex justify-between">
                        <span>Total Notes</span>
                        <span>7</span>
                    </div>

                </div>

            </div>

        </main>


    </div>

    <!-- NEW NOTE MODAL (hidden by default) -->
    <div id="noteModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 w-[90%] max-w-md shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">New Note</h2>
                <button id="closeModal" class="text-gray-400 hover:text-black text-2xl cursor-pointer">&times;</button>
            </div>
            <input id="noteTitleInput" type="text" placeholder="Note title." maxlength="100"
                class="w-full px-4 py-2 mb-3 placeholder:text-black/30 duration-300 text-black bg-gray-400 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" />
            <textarea id="noteBodyInput" rows="5" placeholder="Write your note..." maxlength="5000"
                class="w-full px-4 py-2 mb-3 bg-gray-400 border placeholder:text-black/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"></textarea>
            <select id="noteTagSelect" class="w-full px-4 bg-gray-400 py-2 mb-4 border rounded-lg focus:outline-none focus:ring-2 duration-300 focus:ring-blue-400">
                <option value="Personal">Personal</option>
                <option value="Important">Important</option>
                <option value="Work">Work</option>
            </select>
            <button id="saveNoteBtn" class="w-full bg-blue-600 text-white py-2 rounded-lg duration-300 hover:bg-blue-700 cursor-pointer">Save Note</button>
        </div>
    </div>

    <!-- Load dashboard logic -->
    <script type="module" src="js/dashboard.js"></script>
</body>

</html>
