<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noter | Sign-up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="media/favicon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap');
    </style>

</head>
<body class="w-full bg-white overflow-x-hidden animate-gradient-x" >

    <video id="bgVid" autoplay muted loop class="fixed mt-[4rem] -z-10 h-full w-full object-cover invert brightness-75" src="media/307818_medium.mp4" type="video/mp4"></video>
    <!-- <style>
        @keyframes gradient-x {
            0%, 100% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
        }

        .animate-gradient-x {
            background-size: 200% 200%; /* Required to give the background room to move */
            animation: gradient-x 8s ease infinite;
        }
    </style> -->
    <div class="flex flex-col items-center mt-[-4rem] lg:mt-[-4rem]">
        <img src="media/Noter_logo.png" class="h-[20rem]" >
        <div class="bg-zinc-600/80 backdrop-blur-[0.4rem] h-auto py-8 w-[90%] lg:w-[26rem] rounded-xl mt-[-7rem] lg:mt-[-6rem] shadow-black/50 shadow-xl scale-90 md:scale-95 lg:scale-100">

            <div class="flex flex-col items-center font-['sansation'] px-8">
                <!-- Header -->
                <div class="text-3xl flex justify-center w-full mb-6">
                    <h1 class="font-bold text-white">Sign-up To</h1>
                    <h1 class="font-bold pl-2 text-blue-600">Noter</h1>
                </div>

                <form class="flex flex-col gap-4 w-full max-w-md mx-auto scale-105" autocomplete="on">

                    <!-- Email box -->
                    <div class="flex flex-col gap-1">
                        <label for="username" class="text-white text-sm font-bold font-['arimo']">E-mail</label>
                        <input id="email" type="email" name="username" required placeholder="Enter your email" 
                            class="font-['arimo'] rounded-lg px-4 py-2 border border-blue-900/50 focus:outline-none focus:ring-2 transition-all duration-300 focus:ring-blue-400 bg-white text-zinc-900 placeholder-zinc-400" />
                    </div>

                    <!-- Password box -->
                    <div class="flex flex-col gap-1 relative">
                        <label for="passwordInput" class="text-white text-sm font-bold font-['arimo']">Password</label>
                        <input id="password" type="password" name="password" required minlength="8" maxlength="20" placeholder="Create a password" 
                            class="font-['arimo'] rounded-lg px-4 py-2 border border-blue-900/50 focus:outline-none focus:ring-2 transition-all duration-300 focus:ring-blue-400 bg-white text-zinc-900 placeholder-zinc-400" />
                            <lable class="text-[.7rem] font-semibold text-white/70 ml-2">8-20 characters</lable>
                    </div>

                    <!-- Confirm Password box -->
                    <div class="flex flex-col gap-1">
                        <label for="confirmPassword" class="text-white text-sm font-bold font-['arimo']">Confirm Password</label>
                        <input id="confirmPassword" type="password" name="confirmPassword" required placeholder="Repeat your password" 
                            class="font-['arimo'] rounded-lg px-4 py-2 border border-blue-900/50 focus:outline-none focus:ring-2 transition-all duration-300 focus:ring-blue-400 bg-white text-zinc-900 placeholder-zinc-400" />
                    </div>

                    <!--Create Account Button -->
                    <button id="signupBtn" type="submit" class="w-full mt-2 bg-gradient-to-r from-blue-600 to-blue-400 hover:from-blue-700 hover:to-blue-500 hover:-translate-y-1 text-white font-bold py-2 rounded-lg shadow-xl shadow-black/30 transition-all duration-300 text-lg">
                        Create Account
                    </button>

                    <!-- Bottom Link -->
                    <div class="flex flex-row justify-center items-center mt-4 w-full gap-2">
                        <p class="text-white">Already have an account?</p>
                        <a href="index.html" class="text-blue-600 hover:underline font-bold hover:text-yellow-400 duration-300">Login</a>
                    </div>
                </form>
            </div>
        </div>
        <p id="errorMsg" class="text-[1.2rem] text-white z-50 mt-5 px-4 py-2 bg-red-900/90 border border-white rounded-xl font-['arimo'] transition-all duration-300 ease-in-out opacity-0 translate-y-2">Something went wrong</p>
    </div>    


    <script type="module" src="js/signup.js"></script>
</body>
