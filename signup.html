<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noter | Sign-up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="media/favicon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap');
    </style>

</head>
<body class="w-full bg-gradient-to-br from-purple-950 to-purple-300 overflow-x-hidden animate-gradient-x" >
    <style>
        @keyframes gradient-x {
            0%, 100% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
        }

        .animate-gradient-x {
            background-size: 200% 200%; /* Required to give the background room to move */
            animation: gradient-x 8s ease infinite;
        }
    </style>
    <div class="flex flex-col items-center mt-[-4rem] lg:mt-[-1rem]">
        <img src="media/Noter_logo.png" class="h-[20rem]" >
        <div class="bg-white/60 backdrop-blur-2xl h-auto py-8 w-[90%] lg:w-[26rem] rounded-xl mt-[-7rem] lg:mt-[-6rem] shadow-black/50 shadow-xl scale-90 md:scale-95 lg:scale-100">

            <div class="flex flex-col items-center font-['sansation'] px-8">
                <!-- Header -->
                <div class="text-3xl flex justify-center w-full mb-6">
                    <h1 class="font-bold text-zinc-800">Create a</h1>
                    <h1 class="font-bold pl-2 text-purple-600">Noter</h1>
                </div>

                <form class="flex flex-col gap-4 w-full max-w-md mx-auto scale-105" autocomplete="on">

                    <!-- Email box -->
                    <div class="flex flex-col gap-1">
                        <label for="username" class="text-zinc-700 text-sm font-bold font-['arimo']">E-mail</label>
                        <input id="username" type="email" name="username" required placeholder="Enter your email" 
                            class="font-['arimo'] rounded-lg px-4 py-2 border border-purple-900/50 focus:outline-none focus:ring-2 transition-all duration-300 focus:ring-purple-400 bg-white text-zinc-900 placeholder-zinc-400" />
                    </div>

                    <!-- Password box -->
                    <div class="flex flex-col gap-1 relative">
                        <label for="passwordInput" class="text-zinc-700 text-sm font-bold font-['arimo']">Password</label>
                        <input id="passwordInput" type="password" name="password" required minlength="8" placeholder="Create a password" 
                            class="font-['arimo'] rounded-lg px-4 py-2 border border-purple-900/50 focus:outline-none focus:ring-2 transition-all duration-300 focus:ring-purple-400 bg-white text-zinc-900 placeholder-zinc-400" />
                    </div>

                    <!-- Confirm Password box -->
                    <div class="flex flex-col gap-1">
                        <label for="confirmPassword" class="text-zinc-700 text-sm font-bold font-['arimo']">Confirm Password</label>
                        <input id="confirmPassword" type="password" name="confirmPassword" required placeholder="Repeat your password" 
                            class="font-['arimo'] rounded-lg px-4 py-2 border border-purple-900/50 focus:outline-none focus:ring-2 transition-all duration-300 focus:ring-purple-400 bg-white text-zinc-900 placeholder-zinc-400" />
                    </div>

                    <!-- Sign Up Button -->
                    <button type="submit" class="w-full mt-2 bg-gradient-to-r from-purple-600 to-purple-400 hover:from-purple-700 hover:to-purple-500 hover:-translate-y-1 text-white font-bold py-2 rounded-lg shadow-xl shadow-black/30 transition-all duration-300 text-lg">
                        Create Account
                    </button>

                    <!-- Bottom Link -->
                    <div class="flex flex-row justify-center items-center mt-4 w-full gap-2">
                        <p class="text-zinc-600">Already have an account?</p>
                        <a href="index.html" class="text-purple-600 hover:underline font-bold">Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>    
</body>
